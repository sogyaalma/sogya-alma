type":"media","target":"","id":"{A817A6C3-2736-4E13-AF30-ADBDA4B17A5C}"}},"Commissions":{"value":""},"BooksType":null,"ButtonText":{"value":""},"ButtonUrl":{"value":{"href":""}}}},{"id":"753340e4-ece0-4bce-8aab-39ecb1607f16","url":"https://cms.moc.gov.sa/Ministries/GlobalSharedData/Publications/Child-Culture/third-Guidelines","name":"third-Guidelines","displayName":"third-Guidelines","fields":{"Title":{"value":"الدليل العملي لتدريب ميسري البرامج الثقافية"},"Date":{"value":"0001-01-01T00:00:00Z"},"Description":{"value":""},"ThumnailImage":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/1.png?h=613\u0026iar=0\u0026w=613\u0026hash=D7C3DBC407B6C33401BCB22B81924B98","alt":"1","width":"613","height":"613"}},"FileURL":{"value":{"href":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/20230214_MoC_Child-Culture_Guidebook-3.pdf","linktype":"media","target":"","id":"{90B234DD-6C9B-43DA-B20D-60FD41E69787}"}},"Commissions":{"value":""},"BooksType":null,"ButtonText":{"value":""},"ButtonUrl":{"value":{"href":""}}}}],"CulturalPersonsHeading":{"value":"شخصيات بارزة"},"CulturalPersonsPersons":[{"id":"6ca1ddf3-6f48-4dcf-a28d-1acd6ad9da79","url":"/Data/Home/Child-Culture/Cultural-Persons/Peron-1","name":"Peron 1","displayName":"Peron 1","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"عبدالله بلخير"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eهل سمعت من قبل عن مترجم الملك عبد العزيز -رحمه الله- ؟\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eهو عبدالله باخير ولد عام 1912م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eكان إعلامياً وشاعراً، ورافق الملك عبدالعزيز في رحلاته، لبراعته في الترجمة واللغة. رافق الملك فيصل والملك خالد -رحمهما الله- في رحلاتهما لدول أوربا والولايات المتحدة بصفته مترجماً\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eالجوائز والإنجازات:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eترجم للملك عبد العزيز -رحمه الله- لقاءه التاريخي مع الرئيس الأمريكي \"فرانكلين روزفلت\"، ولقاءه مع رئيس الوزراء البريطاني \"ونستون تشرشل\" 1945م.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e كتب 15 نشيداً وطنياً أقر منها 13 نشيداً وعممت على مدارس المملكة\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/Abdullah_baalkhair.png?h=657\u0026iar=0\u0026w=1042\u0026hash=4AD66F5579389DAE13AB4D5F392EA958","alt":"Abdullah_baalkhair","width":"1042","height":"657"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"cbe5c1e3-0208-40a7-bace-974c90d59946","url":"/Data/Home/Child-Culture/Cultural-Persons/Peron-13","name":"Peron 13","displayName":"Peron 13","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":" صفية بن زقر"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان| من أوائل الفنانات التشكيلية في المملكة\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eولدت صفية بن زقر في عام 1940\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eاشتهرت ببصمتها الخاصة وأسلوبها المتفرد\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eوأبدعت في مجال التشكيلي\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eوقلدها الملك سلمان -حفظه الله- وسام الملك عبدالعزيز من الدرجة الأولى عام 2017م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eوصلت الى العالمية وقدمت معارض شخصية في كل من لندن وباريس وجنيف.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eحتى افتتحت \"دارة صفية بن زقر\" في جدة التي تعد ملتقىً للفن وأهله في المنطقة.\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/safiah.png?h=657\u0026iar=0\u0026w=1043\u0026hash=A1EAD60F21FF17919D5B0C2DBA501D9C","alt":"safiah","width":"1043","height":"657"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"be51b5a1-b13f-448f-9d2e-7e2f141170c9","url":"/Data/Home/Child-Culture/Cultural-Persons/Peron-2","name":"Peron 2","displayName":"Peron 2","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"إبراهيم خفاجي"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان| سارعي للمجد والعلياء.. هل تعرف كاتب هذه الكلمات التي تحفظها عن ظهر قلب؟\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eولد إبراهيم خفاجي في عام 1926م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eشاعر النشيد الوطني السعودي ومن أهم رواد النهضة الفنية في المملكة، كما أسهم في إثراء الأغنية السعودية، ودعم العديد من الفنانين في بداياتهم. كُلف بكتابة النشيد الوطني واستغرق ستة أشهر حتى كتب كلمات النشيد الحالية. كتب مئات القصائد وتغنى بأعماله نخبة من الفنانين السعوديين والعرب.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eأشهر قصائده:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eمن العايدين\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eتصدق ولا أحلف لك\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأشوفك كل يوم\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/Ibrahim.png?h=657\u0026iar=0\u0026w=1043\u0026hash=20F1AC20F700DFE4271BD93658641F31","alt":"Ibrahim","width":"1043","height":"657"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"c649fdc6-2d84-4803-b443-a63e8562fe03","url":"/Data/Home/Child-Culture/Cultural-Persons/Person-3","name":"Person 3","displayName":"Person 3","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"أروى خميس"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأروى خميس، ولدت عام 1974م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eكاتبة وروائية لها عدة مشاركات مؤثرة محلياً وعالمياً، ترشحت عدة كتب لها لجوائز عالمية.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eفازت بجائزة الكتاب الذهبي في \"المهرجان القرائي الأول للأطفال\" في الشارقة عن قصة \"عربة سديل ودميتي\" عام 2006.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأسست (دار أروى العربية للنشر) المختصة بكتب الأطفال واليافعين.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eمن أشهر مؤلفاتها:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eخذها يا عيد\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأنا رومي.. أحب أمي ولا أحب الفساتين الوردية\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/Arwa.png?h=658\u0026iar=0\u0026w=1043\u0026hash=AE07ADEB826A1F5182DFE94B269AA2BE","alt":"Arwa","width":"1043","height":"658"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"97d26c7b-0126-4cdf-88ad-02efd9a1565a","url":"/Data/Home/Child-Culture/Cultural-Persons/Person-4","name":"Person 4","displayName":"Person 4","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"خلف بن هذال العتيبي"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eخلف بن هذال العتيبي، ولد عام 1943م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eرمز من رموز الشعر النبطي في المملكة، لقبه الملك عبد الله بن عبد العزيز - رحمه الله - بلقب شاعر الوطن، يتميز بمقدرته الفذة على الإلقاء الحماسي للشعر، كتب أولى قصائده بعمر الثالثة عشر،\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e قلده الملك سلمان بن عبد العزيز - حفظه الله _ وسام الملك عبد العزيز من الدرجة الأولى عام 2017م.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eمن أشهر قصائده:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eجعل السحاب اللي معه برق ورعود\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eيالله بأمانك من النكبات التامة\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأوبريت دولة ورجال\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/khalaf.png?h=658\u0026iar=0\u0026w=1043\u0026hash=65F6C63AB93DFCF946A7D6FA2F24E7AD","alt":"khalaf","width":"1043","height":"658"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"73cb4f66-2ef5-4fd4-a44b-5a6300ac4192","url":"/Data/Home/Child-Culture/Cultural-Persons/Person-6","name":"Person 6","displayName":"Person 6","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"صاحب السمو الملكي الأمير خالد بن فيصل بن عبد العزيز آل سعود"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eصاحب السمو الملكي الأمير خالد بن فيصل بن عبد العزيز آل سعود، ولد عام 1940م، مستشار خادم الحرمين الشريفين، وأمير منطقة مكة المكرمة، من أشهر شعراء النبطي، وفنان تشكيلي عريق، صدرت له ستة دواوين، تُرجمت إلى عدة لغات، أقام معارض فنية محلية ودولية عديدة؛ مثل المعرض المشترك مع الملك البريطاني تشارلز، أسس 12 مرسماًفي قرية المفتاحة.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eمن أشهر قصائدة:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأوبريت التوحيد\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأجاذبك الهوى\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأنا السعودي\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/prince.png?h=657\u0026iar=0\u0026w=1043\u0026hash=31F6E31DD49094DBC2E47FF2CE4513B8","alt":"prince","width":"1043","height":"657"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"c68bb379-06bc-43e5-92e9-d4836fe356f4","url":"/Data/Home/Child-Culture/Cultural-Persons/Person-7","name":"Person 7","displayName":"Person 7","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"الشاعر طاهر عبد الرحمن زمخشري"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eالشاعر طاهر عبد الرحمن زمخشري، ولد عام 1914م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eما أبرز شعراء الأدب السعودي، وصاحبُ أول ديوان شعري مطبوع، وحصل على جائزة الدولة التقديرية للأدب. ويعد من رواد الإذاعة السعودية في بداياتها، وقدم فيها برنامجه الشهير \"بابا طاهر\"؟\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e تُرجمت بعض قصائده إلى عدة لغات.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eمن أشهر قصائده:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eإلى المروتين\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eحديث عينيك\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eالنفس المؤمنة\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/tahier.png?h=658\u0026iar=0\u0026w=1042\u0026hash=21CF29B33614F112A7F84A27E140B80C","alt":"tahier","width":"1042","height":"658"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}},{"id":"ae9a9fb8-aebe-43d8-8a50-311a33f1cc69","url":"/Data/Home/Child-Culture/Cultural-Persons/Person-8","name":"Person 8","displayName":"Person 8","fields":{"ImageButtonText":{"value":"اقرأ أكثر"},"ImageTitle":{"value":"غازي عبد الرحمن القصيبي"},"ImageShortDescription":{"value":"\u003cp style=\"text-align: right;\"\u003eعن فنان\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eغازي عبد الرحمن القصيبي، ولد عام 1940م\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأحد أشهر أدباء المملكة، صدرت له دواوين وروايات عديدة،\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e تُرجمت أعماله إلى عدة لغات، حاز على وسام الملك عبد العزيز، وعدة أوسمة وألقاب عربية.\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003e\u003cstrong\u003eمن أشهر قصائده:\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eأجل نحن الحجاز ونحن نجد\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eلك الحمد\u003c/p\u003e\n\u003cp style=\"text-align: right;\"\u003eحديقة الغروب\u003c/p\u003e"},"ImageButtonUrl":{"value":{"href":"https://moc.gov.sa","linktype":"external","url":"https://moc.gov.sa","anchor":"","target":""}},"ImageSubTitle":{"value":""},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/ChildCulture/persona/persona/ghazi.png?h=657\u0026iar=0\u0026w=1042\u0026hash=8EFE7FAC79A70AC6C4349F154D91E3AF","alt":"ghazi","width":"1042","height":"657"}},"ImageEnabled":{"value":true},"IsTextRequiredonImage":{"value":false},"ButtonEnabled":{"value":true}}}],"PodcastTawelaFiles":[{"id":"99645cbb-3389-48c2-84ab-80b004e7988a","url":"/Modules/Pages/Publications/Podcast-Tawela/Page-Components/PodcastTawela/Podcast-Tawela7","name":"Podcast Tawela7","displayName":"Podcast Tawela7","fields":{"VideoID":{"value":"maIJA9XOyVs"},"date":{"value":"2024-03-24T21:00:00Z"},"Title":{"value":"بودكاست طاولة | 3،2،1،ابدأ"},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/Podcast/Images/maxresdefault-(1)/maxresdefault-(6).jpg?h=720\u0026iar=0\u0026w=1280\u0026hash=5193726321B49A1A3449C87A0F01CC26","alt":"maxresdefault (6)","width":"1280","height":"720"}},"SubTitle":{"value":"منذ الصغر اعتدنا الجلوس أمام شاشة التلفزيون، وفي هذه الحلقة يصطحبنا اليافعون في رحلة إلى ما وراء الشاشة، لنتعرّف على تفاصيل شيّقة عن صناعة الأفلام، وأبرز المصطلحات المتداولة في المجال، ومستقبل هذا الفن في المملكة، والعديد من المحاور الممتعة التي تتناولها الحلقة في زيارتها لاستوديو تلفاز 11"}}},{"id":"6a00a3af-a213-4394-889b-bb40cda43051","url":"/Modules/Pages/Publications/Podcast-Tawela/Page-Components/PodcastTawela/Podcast-Tawela8","name":"Podcast Tawela8","displayName":"Podcast Tawela8","fields":{"VideoID":{"value":"ovdrh7HPJ58"},"date":{"value":"2024-04-18T21:00:00Z"},"Title":{"value":"بودكاست طاولة | إلى أين يأخذنا الأدب؟"},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/Podcast/Images/maxresdefault-(1)/maxresdefault-(7).jpg?h=720\u0026iar=0\u0026w=1280\u0026hash=070F0BC28710A2BB2651DCE104EE0C9F","alt":"maxresdefault (7)","width":"1280","height":"720"}},"SubTitle":{"value":"تأخذنا حلقة \"إلى أين يأخذنا الأدب؟\" من بودكاست طاولة إلى الأدب، في نظرة عميقة ومُختلفة، تغيّر الصورة النمطية له من مجرد نصوص وقصائد وكُتب إلى صورته الحقيقية التي تعرّف الأدب كأداة تعبير تجسّد الخيال والفِكر والمشاعر وتحكي الثقافة والقيم الاجتماعية والتجارب الإنسانية، تستضيف الحلقة الدكتور بندر الغميز لنتعرّف أكثر على تأثير اللغات على الأدب وعلى الدلالات التي يأخذنا لها هذا التنوع."}}},{"id":"4eb65102-dbc9-4127-84ff-ac6a8d254f60","url":"/Modules/Pages/Publications/Podcast-Tawela/Page-Compone 22b184-cfc1-46ba-aa7d-610aad083538","url":"/Modules/Pages/Initiative/Baba_Taher_Competition","name":"Baba_Taher_Competition","displayName":"Baba_Taher_Competition","fields":{"Description":{"value":"انطلاقاً من إيمان هيئة الأدب والنشر والترجمة بأهمية صقل المواهب وتعزيز الإبداع الأدبي، قامت الهيئة بتنظيم مسابقة \"بابا طاهر\" التي تهدف إلى تشجيع المهتمين من الفئة العمرية الأكبر من 18 سنة على ممارسة الكتابة والتأليف، حيث تسعى المسابقة إلى تسليط الضوء على أدب الأطفال واليافعين، وذلك عبر مختلف أنواع الكتابة (القصة، القصة المصورة (كومكس)، الرواية القصيرة)، وتحمل المسابقة اسم الرمز الوطني والأديب الرائد في أدب الأطفال السعودي، وعاشق الطفولة الأستاذ طاهر زمخشري \u0026laquo;رحمه الله\u0026raquo; الذي ترسّخ إرثه الفني والأدبي عند الكاتب والمتلقي. عن طاهر زمخشري \"الطفولة هي الوطن والحياة\" طاهر زمخشري (1914م \u0026ndash; 1987م) أديب وشاعر سعودي، غنّى له المطربون، وُلد في مكة، وتُرجمت أعماله إلى الإنجليزية والفرنسية والألمانية، وقد ساهم في الحركة الإعلامية والإبداعية في المملكة، وسخّر مهاراته في كتابة الأطفال حتى لُقِّب بـ \"بابا طاهر\"، كما قدّم برنامجاً إذاعياً باسم \"ركن الأطفال\"، وأسس مجلة أطفال سعودية وهي \"مجلة الروضة\"."},"EventDetailPageLink":{"value":{"href":"https://www.moc.gov.sa/Modules/Pages/Initiative/Baba_Taher_Competition/EventDetail","linktype":"internal","id":"{F28D04F2-5B0D-43F2-AA20-5646BFC3B05E}","url":"/Ministries/Moc/Home/Modules/Pages/Initiative/Baba_Taher_Competition/EventDetail"}},"FromDate":{"value":"2023-11-11T21:00:00Z"},"Image":{"value":{"src":"https://www.moc.gov.sa/-/media/Project/Ministries/Moc/Events/Baba-Taher.png?h=709\u0026iar=0\u0026w=1366\u0026hash=609BB031E85536A74822CF3C7D3086EF","alt":"Baba Taher","width":"1366","height":"709"}},"Location":{"value":""},"Region":{"id":"108eb692-5c24-4a7d-91b9-db694e832013","url":"https://cms.moc.gov.sa/Ministries/GlobalSharedData/Events/EventFilters/Regions/Saudi-Arabia","name":"Saudi Arabia","displayName":"Saudi Arabia","fields":{"Title":{"value":"المملكة العربية السعودية"}}},"TemplatePageLink":{"value
